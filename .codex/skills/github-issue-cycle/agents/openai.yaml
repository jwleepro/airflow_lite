interface:
  display_name: "GitHub Issue Cycle"
  short_description: "Milestone-ordered issue delivery with In Progress sync and per-issue worktrees"
  default_prompt: "Use $github-issue-cycle with github-issue-cycle-agent to first force-sync local main to origin/main when mismatched (discard local main changes via reset --hard and clean), then pick the next milestone-ordered issue, claim it immediately by adding status:in-progress as the first blocking action (stop if claim fails), sync project Status to In Progress when possible with failure logging, execute all coding in a dedicated per-issue git worktree based on origin/main, open a draft PR, and close the loop after CodeRabbit feedback."
