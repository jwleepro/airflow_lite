name: Feature request
description: 새로운 기능이나 사용자 가치 개선 요구를 구조화된 형식으로 접수합니다.
title: "[Feature] "
labels:
  - enhancement
  - type:feature
  - status:needs-triage
  - priority:medium
body:
  - type: markdown
    attributes:
      value: |
        새로운 기능이나 경험 개선 요청을 정리하는 양식입니다.

        - 구현 방식보다 문제와 기대 효과를 먼저 적어주세요.
        - 최종 우선순위와 상태는 트리아지 과정에서 조정될 수 있습니다.

  - type: input
    id: summary
    attributes:
      label: 요청 요약
      description: 한 줄로 요청 내용을 적어주세요.
      placeholder: 예) DuckDB mart refresh 결과를 관리자 화면에서 요약 조회하고 싶음
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 관련 영역
      description: 관련 영역을 모두 선택하세요.
      multiple: true
      options:
        - area:backend
        - area:frontend
        - area:infra
        - area:ci
        - area:docs
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 현재 무엇이 부족하거나 불편한지 적어주세요.
      placeholder: 예) 현재는 로그를 직접 열어야만 refresh 결과를 확인할 수 있어 운영 판단이 느림
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: 원하는 결과
      description: 사용자가 어떤 결과를 얻어야 하는지 적어주세요.
      placeholder: 예) 최근 refresh 성공/실패, 소요 시간, snapshot 상태를 API와 UI에서 한 번에 확인
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 수용 기준
      description: 완료 판단에 필요한 조건을 적어주세요.
      placeholder: |
        - ...
        - ...
        - ...
    validations:
      required: true

  - type: checkboxes
    id: human_review_signals
    attributes:
      label: 사람 검토 필요 신호
      description: 하나라도 해당하면 `needs-human` 검토 대상으로 분류합니다.
      options:
        - label: 운영 반영 필요 (Windows 서비스, 스케줄, 배포 절차, 설정 변경 포함)
        - label: 데이터 위험 있음 (삭제, 재적재, 백필, 마이그레이션, 스키마 영향 포함)
        - label: 외부 시스템 영향 있음 (Oracle, 파일 저장소, 외부 API, 알림, 인증 시스템 포함)
        - label: 사람 승인 또는 판단 필요 (우선순위, 정책, 위험 수용 판단 등)
    validations:
      required: false

  - type: dropdown
    id: urgency
    attributes:
      label: 요청 긴급도
      description: 운영 우선순위 판단에 필요한 신호입니다.
      options:
        - 이번 스프린트나 현재 작업과 직접 연결됨
        - 가까운 시일 내 필요하지만 우회 가능
        - 아이디어 탐색 또는 장기 후보
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: 제약 사항 또는 비고
      description: Windows, Oracle, DuckDB, 폐쇄망, 운영 정책 등 관련 제약이 있으면 적어주세요.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: 제출 전 확인
      options:
        - label: 이미 존재하는 기능 요청이나 계획된 작업과 중복되지 않는지 확인했습니다.
          required: true
        - label: 문제와 기대 결과를 구현 세부보다 우선해서 정리했습니다.
          required: true
