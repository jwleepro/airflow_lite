name: Bug report
description: 결함, 회귀, 오작동을 구조화된 형식으로 접수합니다.
title: "[Bug] "
labels:
  - bug
  - status:needs-triage
  - priority:medium
body:
  - type: markdown
    attributes:
      value: |
        재현 가능한 결함을 빠르게 분류하기 위한 양식입니다.

        - `status:*`와 최종 `priority:*`는 트리아지 과정에서 조정될 수 있습니다.
        - 보안 취약점은 공개 이슈로 등록하지 마세요.

  - type: input
    id: summary
    attributes:
      label: 문제 요약
      description: 한 줄로 핵심 증상을 적어주세요.
      placeholder: 예) 백필 실행 시 Parquet 검증 단계에서 예외가 발생함
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 영향 범위
      description: 관련 영역을 모두 선택하세요.
      multiple: true
      options:
        - area:backend
        - area:frontend
        - area:infra
        - area:ci
        - area:docs
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: 영향도
      description: 운영 우선순위 판단에 필요한 신호입니다.
      options:
        - 서비스 중단 또는 데이터 손상 가능
        - 핵심 기능 사용 불가 또는 심각한 불편
        - 우회 가능한 문제 또는 제한적 영향
    validations:
      required: true

  - type: checkboxes
    id: human_review_signals
    attributes:
      label: 사람 검토 필요 신호
      description: 하나라도 해당하면 `needs-human` 검토 대상으로 분류합니다.
      options:
        - label: 운영 반영 필요 (Windows 서비스, 스케줄, 배포 절차, 설정 변경 포함)
        - label: 데이터 위험 있음 (삭제, 재적재, 백필, 마이그레이션, 스키마 영향 포함)
        - label: 외부 시스템 영향 있음 (Oracle, 파일 저장소, 외부 API, 알림, 인증 시스템 포함)
        - label: 사람 승인 또는 판단 필요 (우선순위, 정책, 위험 수용 판단 등)
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: 재현 절차
      description: 재현 순서, 입력값, 실행 명령을 순서대로 적어주세요.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
      placeholder: 예) 배치가 정상 완료되고 실행 이력이 success로 기록되어야 함
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 결과
      placeholder: 예) validation error와 함께 step_runs에 failed로 기록됨
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 실행 환경
      description: 가능한 범위에서 버전과 환경 정보를 적어주세요.
      placeholder: |
        - OS:
        - Python:
        - Oracle:
        - DuckDB:
        - 실행 경로 또는 서비스:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 로그 또는 스크린샷
      description: 관련 로그, 스택 트레이스, 스크린샷을 붙여주세요.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: 제출 전 확인
      options:
        - label: 중복 이슈를 확인했습니다.
          required: true
        - label: 민감한 정보나 비밀값을 포함하지 않았습니다.
          required: true
