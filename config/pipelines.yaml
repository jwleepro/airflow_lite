# config/pipelines.yaml — 파이프라인 정의 예시

oracle:
  host: ${ORACLE_HOST}
  port: ${ORACLE_PORT}
  service_name: ${ORACLE_SERVICE}
  user: ${ORACLE_USER}
  password: ${ORACLE_PASSWORD}

storage:
  parquet_base_path: "D:/data/parquet"
  sqlite_path: "D:/data/airflow_lite.db"
  log_path: "D:/data/logs"

defaults:
  chunk_size: 10000
  retry:
    max_attempts: 3
    min_wait_seconds: 4
    max_wait_seconds: 60
  parquet:
    compression: "snappy"

pipelines:
  - name: "production_log"
    table: "PRODUCTION_LOG"
    partition_column: "LOG_DATE"
    strategy: "full"
    chunk_size: 20000
    schedule: "0 2 * * *"
    columns:
      - "LOG_ID"
      - "PRODUCT_CODE"
      - "LOG_DATE"
      - "QUANTITY"
      - "STATUS"

  - name: "equipment_status"
    table: "EQUIPMENT_STATUS"
    partition_column: "STATUS_DATE"
    strategy: "incremental"
    schedule: "0 */6 * * *"
    incremental_key: "UPDATED_AT"
